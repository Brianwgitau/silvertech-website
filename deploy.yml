name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Prepare `public/` folder and copy site files
        run: |
          rm -rf public
          mkdir -p public
          cp -a index.html assets js pages public/

      - name: Generate firebase-config.js from secrets (written to `public/`)
        run: |
          cat > ./public/firebase-config.js <<'EOFCONFIG'
          window.FIREBASE_CONFIG = {
            apiKey: "${{ secrets.FIREBASE_API_KEY }}",
            authDomain: "${{ secrets.FIREBASE_AUTH_DOMAIN }}",
            projectId: "${{ secrets.FIREBASE_PROJECT_ID }}",
            storageBucket: "${{ secrets.FIREBASE_STORAGE_BUCKET }}",
            messagingSenderId: "${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}",
            appId: "${{ secrets.FIREBASE_APP_ID }}"
          };
          EOFCONFIG

      - name: Generate cloudinary-config.js from secrets (optional, in `public/`)
        if: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
        run: |
          cat > ./public/cloudinary-config.js <<'EOFCONFIG'
          window.CLOUDINARY_CONFIG = {
            cloudName: "${{ secrets.CLOUDINARY_CLOUD_NAME }}",
            uploadPreset: "${{ secrets.CLOUDINARY_UPLOAD_PRESET }}"
          };
          EOFCONFIG

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: public
          publish_branch: gh-pages
